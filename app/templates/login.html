<!DOCTYPE html>
<html>
<head>
    <title>Login - Mini SIEM</title>
    <style>
        body {
            background: #0b1220;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #020617;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #1e293b;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 10px;
            width: 220px;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #38bdf8;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Mini SIEM Login</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
